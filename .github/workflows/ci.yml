name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with ruff
        run: pip install ruff && ruff cheZck .
      - name: Run tests with coverage
        run: pip install pytest pytest-cov && pytest tests/ --cov=app --cov-report=term-missing
      - name: Build Docker Image
        run: docker build -t test-image .