<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favourite Dogs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            color: white;
            text-align: center;
            padding: 40px;
        }
        h1 { margin-bottom: 20px; }
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            width: 200px;
            background: #2c2c3e;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
        }
        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #5b8dee;
            color: white;
        }
    </style>
</head>
<body>
    <h1>❤️ Favourite Dogs</h1>
    <div class="grid" id="grid"></div>
    <button onclick="window.location.href='/'">← Back</button>

    <script>
        async function loadFavourites() {
            const res = await fetch('/favourites');
            const data = await res.json();
            const grid = document.getElementById("grid");

            if (data.length === 0) {
                grid.innerHTML = "<p>No favourites yet!</p>";
                return;
            }

            data.forEach(dog => {
                const card = document.createElement("div");
                card.className = "card";
                card.id = `card-${dog.id}`;
                card.innerHTML = `
        <img src="${dog.url}" alt="Favourite dog">
        <button onclick="deleteFavourite(${dog.id})" style="
            margin-top: 10px;
            background: #e05555;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            width: 100%;
        ">🗑️ Remove</button>
    `;
                grid.appendChild(card);
            });
        }
            async function deleteFavourite(id) {
        const res = await fetch(`/favourite/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.message) {
            document.getElementById(`card-${id}`).remove();
        }
    }

        loadFavourites();
    </script>
</body>
</html>
