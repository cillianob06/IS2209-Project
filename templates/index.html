<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dog Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: black;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #ccc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff7b54;
            color: white;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        .stats-btn {
            background: #4cc9f0;
        }

        .card {
            margin: 30px auto;
            width: 400px;
            background: #2c2c3e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <h1>🐶 Dog Explorer Dashboard</h1>
    <p>Click below to discover random dogs and track usage stats</p>

    <button onclick="getDog()">Get Random Dog</button>
    <button class="stats-btn" onclick="window.location.href='/stats-page'">📊 Stats</button>

    <div class="card">
        <img id="dogImage" src="" alt="Dog will appear here">
    </div>

    <script>
        async function getDog() {
            const res = await fetch('/random-dog');
            const data = await res.json();
            document.getElementById("dogImage").src = data.url;
        }

        getDog();
    </script>
</body>
</html>
