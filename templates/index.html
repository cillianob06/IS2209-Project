<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dog Dashboard</title>
<button onclick="getDog()">Get Random Dog</button>
<button class="stats-btn" onclick="window.location.href='/stats-page'">📊 Stats</button>
<button class="fav-btn" onclick="saveFavourite()">❤️ Favourite</button>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: blue;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #ccc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff7b54;
            color: white;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        .stats-btn {
            background: #4cc9f0;
        }

        .card {
            margin: 30px auto;
            width: 400px;
            background: #2c2c3e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
        }
        .fav-btn {
    background: #e05555;
}
    </style>
</head>

<body>
    <h1>🐶 Dog Explorer Dashboard</h1>
    <p>Click below to discover random dogs and track usage stats</p>

    <button onclick="getDog()">Get Random Dog</button>
    <button class="stats-btn" onclick="window.location.href='/stats-page'">📊 Stats</button>
    <button class="fav-btn" onclick="window.location.href='/favourites-page'">❤️ View Favourites</button>

    <div class="card">
        <img id="dogImage" src="" alt="Dog will appear here">
    </div>

    <div style="margin-top: 20px;">
    <select id="breedSelect" style="
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        background: #2c2c3e;
        color: white;
        width: 220px;
    ">
        <option value="">All breeds (random)</option>
    </select>
    <button onclick="getDogByBreed()" style="margin-left: 10px;">🔍 Search</button>
    </div>

    <script>
        let currentDogUrl = "";

async function getDog() {
    const res = await fetch('/random-dog');
    const data = await res.json();
    currentDogUrl = data.url;
    document.getElementById("dogImage").src = data.url;
}

async function saveFavourite() {
    if (!currentDogUrl) return;
    const res = await fetch('/favourite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: currentDogUrl })
    });
    const data = await res.json();
    alert(data.message || "Saved!");
}
        async function getDog() {
            const res = await fetch('/random-dog');
            const data = await res.json();
            document.getElementById("dogImage").src = data.url;
        }

        getDog();

    // Load breeds into dropdown on startup
async function loadBreeds() {
    const res = await fetch('/breeds');
    const breeds = await res.json();
    const select = document.getElementById("breedSelect");

    breeds.forEach(breed => {
        const option = document.createElement("option");
        option.value = breed.id;
        option.textContent = breed.name;
        select.appendChild(option);
    });
}

async function getDogByBreed() {
    const breedId = document.getElementById("breedSelect").value;

    let url = breedId ? `/random-dog-by-breed/${breedId}` : '/random-dog';
    const res = await fetch(url);
    const data = await res.json();
    currentDogUrl = data.url;
    document.getElementById("dogImage").src = data.url;
}

// Update getDog to also track currentDogUrl
async function getDog() {
    const res = await fetch('/random-dog');
    const data = await res.json();
    currentDogUrl = data.url;
    document.getElementById("dogImage").src = data.url;
}

getDog();
loadBreeds();
    </script>
</body>
</html>
