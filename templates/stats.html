<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dog Dashboard - Stats</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .card {
            margin: 30px auto;
            width: 300px;
            background: #2f2f45;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .count {
            font-size: 64px;
            font-weight: bold;
            color: #ff7b54;
        }

        .label {
            font-size: 16px;
            color: #ccc;
            margin-top: 8px;
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4cc9f0;
            color: white;
            transition: 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <h1>📊 Stats</h1>

    <div class="card">
        <div class="count" id="count">...</div>
        <div class="label">Total dog requests (All-Time)</div>
    </div>

    <div class="card" id="leaderboard-card">
        <h2>🏆 Top Breeds</h2>
        <div id="leaderboard"></div>
    </div>

    <button onclick="window.location.href='/'">← Back</button>

    <script>
        async function loadStats() {
            const res = await fetch('/stats');
            const data = await res.json();
            document.getElementById("count").textContent = data.total_dog_requests;
        }

        async function loadLeaderboard() {
            const res = await fetch('/leaderboard');
            const data = await res.json();
            const lb = document.getElementById("leaderboard");

            if (data.length === 0) {
                lb.innerHTML = "<p>No data yet — fetch some dogs!</p>";
                return;
            }

            data.forEach((item, index) => {
                lb.innerHTML += `<p>${index + 1}. ${item.breed} — ${item.count} requests</p>`;
            });
        }

        loadStats();
        loadLeaderboard();
    </script>
</body>
</html>
